<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔥 Surpresa Churrasco! 🍖</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(160deg, #1a0800 0%, #5c1a00 45%, #1a0800 100%);
      font-family: 'Nunito', sans-serif;
      overflow: hidden; position: relative;
    }

    .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .confetti { position: absolute; opacity: 0; animation: fall linear infinite; }
    @keyframes fall {
      0%   { transform: translateY(-30px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
    }

    .floaters { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .floater {
      position: absolute; font-size: 2rem;
      animation: floatUp linear infinite; opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg);  opacity: 0;   }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) rotate(30deg); opacity: 0;   }
    }

    .smoke-wrap { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); pointer-events: none; z-index: 2; }
    .smoke {
      position: absolute; bottom: 0; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,180,80,0.18) 0%, transparent 70%);
      animation: smokeRise linear infinite;
    }
    @keyframes smokeRise {
      0%   { transform: translateY(0)     scale(1); opacity: 0.6; }
      100% { transform: translateY(-40vh) scale(3); opacity: 0;   }
    }

    .card {
      position: relative; z-index: 10;
      background: rgba(255,120,20,0.10);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,150,50,0.30); border-radius: 32px;
      padding: 48px 52px; text-align: center;
      max-width: 500px; width: 92%;
      box-shadow: 0 8px 60px rgba(200,60,0,0.5), 0 0 80px rgba(255,100,0,0.15);
      animation: popIn 0.9s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.6) translateY(50px); }
      to   { opacity: 1; transform: scale(1)   translateY(0);    }
    }

    .bbq-icon {
      font-size: 5rem; display: block; margin-bottom: 12px;
      animation: shake 1.5s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(255,120,0,0.8));
    }
    @keyframes shake {
      0%,100% { transform: rotate(-6deg) scale(1);   }
      25%      { transform: rotate(6deg)  scale(1.08); }
      50%      { transform: rotate(-4deg) scale(1);   }
      75%      { transform: rotate(4deg)  scale(1.05); }
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.8rem, 6vw, 2.8rem); line-height: 1.25;
      background: linear-gradient(90deg, #ffd700, #ff6a00, #ff0000, #ffd700);
      background-size: 300% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: shimmer 2.5s linear infinite;
      filter: drop-shadow(0 0 12px rgba(255,120,0,0.6)); margin-bottom: 24px;
    }
    @keyframes shimmer {
      0%   { background-position: 0%   center; }
      100% { background-position: 300% center; }
    }

    .msg {
      color: rgba(255,220,160,0.9); font-size: 1.15rem;
      font-weight: 700; line-height: 1.6;
      background: rgba(0,0,0,0.25); border-radius: 16px;
      padding: 20px 24px; border: 1px solid rgba(255,140,0,0.25);
      margin-bottom: 28px; animation: glowPulse 2.5s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%,100% { box-shadow: 0 0 10px rgba(255,100,0,0.2); }
      50%      { box-shadow: 0 0 28px rgba(255,100,0,0.5); }
    }

    .emoji-row {
      font-size: 2rem; letter-spacing: 8px; margin-bottom: 28px;
      animation: bounce 1.8s ease-in-out infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-8px); }
    }

    .back-btn {
      display: inline-block; padding: 12px 28px;
      background: rgba(255,255,255,0.10); color: rgba(255,220,160,0.9);
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.95rem;
      border-radius: 50px; text-decoration: none;
      border: 1px solid rgba(255,150,50,0.35);
      transition: background 0.2s, transform 0.2s;
    }
    .back-btn:hover { background: rgba(255,120,0,0.25); transform: scale(1.05); }

    /* ── Botão Música ── */
    #music-btn {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      width: 58px; height: 58px; border-radius: 50%; cursor: pointer;
      font-size: 1.6rem; background: rgba(255,120,0,0.22);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1.5px solid rgba(255,150,50,0.45);
      box-shadow: 0 4px 20px rgba(200,60,0,0.5);
      transition: transform 0.2s, background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    #music-btn:hover { transform: scale(1.12); background: rgba(255,140,0,0.35); }
    #music-btn.playing { animation: spinNote 3s linear infinite; }
    @keyframes spinNote {
      0%   { transform: rotate(0deg)   scale(1);   }
      50%  { transform: rotate(180deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1);   }
    }

    #music-tip {
      position: fixed; bottom: 90px; right: 16px; z-index: 100;
      background: rgba(0,0,0,0.78); color: #ffd700;
      font-size: 0.78rem; font-weight: 700;
      padding: 8px 14px; border-radius: 12px;
      backdrop-filter: blur(8px); border: 1px solid rgba(255,215,0,0.3);
      max-width: 170px; text-align: center;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    #yt-frame { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; }
  </style>
</head>
<body>

  <div class="confetti-wrap" id="confetti"></div>
  <div class="floaters"      id="floaters"></div>
  <div class="smoke-wrap"    id="smoke"></div>
  <div id="yt-frame"></div>

  <div id="music-tip">🎵 Clique pra tocar a música!</div>
  <button id="music-btn" title="Ligar/Desligar música">🎵</button>

  <div class="card">
    <span class="bbq-icon">🍖</span>
    <h1>Parabéns,<br>você é incrível!</h1>
    <div class="emoji-row">🔥 🥩 🌭 🍗 🔥</div>
    <p class="msg">
      Se eu pudesse,<br>
      te levava uma <strong style="color:#ffd700;">linguiça de churrasco!</strong> 🫶🔥
    </p>
    <a class="back-btn" href="index.html">← Voltar para o início</a>
  </div>

  <script>
    /* Confetti */
    const confettiEl = document.getElementById('confetti');
    const colors = ['#ffd700','#ff6a00','#ff0000','#ff9900','#fff','#f97316','#fbbf24'];
    for (let i = 0; i < 70; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left              = Math.random() * 100 + 'vw';
      c.style.background        = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (4 + Math.random() * 7) + 's';
      c.style.animationDelay    = (Math.random() * 9) + 's';
      c.style.width             = (8 + Math.random() * 10) + 'px';
      c.style.height            = (12 + Math.random() * 10) + 'px';
      c.style.borderRadius      = Math.random() > 0.5 ? '50%' : '3px';
      confettiEl.appendChild(c);
    }

    /* Floaters */
    const floatersEl = document.getElementById('floaters');
    const bbqEmojis  = ['🔥','🍖','🥩','🌭','🍗','🧨','🎉','🎊','💛','🫶'];
    for (let i = 0; i < 25; i++) {
      const f = document.createElement('div');
      f.className   = 'floater';
      f.textContent = bbqEmojis[Math.floor(Math.random() * bbqEmojis.length)];
      f.style.left              = (3 + Math.random() * 94) + 'vw';
      f.style.fontSize          = (1.2 + Math.random() * 2) + 'rem';
      f.style.animationDuration = (6 + Math.random() * 10) + 's';
      f.style.animationDelay    = (Math.random() * 10) + 's';
      floatersEl.appendChild(f);
    }

    /* Smoke */
    const smokeEl = document.getElementById('smoke');
    for (let i = 0; i < 6; i++) {
      const s    = document.createElement('div');
      s.className = 'smoke';
      const size  = 60 + Math.random() * 80;
      s.style.width             = size + 'px';
      s.style.height            = size + 'px';
      s.style.left              = (-80 + Math.random() * 160) + 'px';
      s.style.animationDuration = (4 + Math.random() * 4) + 's';
      s.style.animationDelay    = (Math.random() * 5) + 's';
      smokeEl.appendChild(s);
    }

    /* Música YouTube */
    const btn   = document.getElementById('music-btn');
    const tip   = document.getElementById('music-tip');
    const wrap  = document.getElementById('yt-frame');
    const VID   = '5A2it2DBEhM';
    let playing = false;
    let iframe  = null;

    setTimeout(() => { tip.style.display = 'none'; }, 4500);

    btn.addEventListener('click', () => {
      if (!playing) {
        iframe = document.createElement('iframe');
        iframe.src = `https://www.youtube.com/embed/${VID}?autoplay=1&loop=1&playlist=${VID}&controls=0`;
        iframe.allow = 'autoplay';
        iframe.setAttribute('allowfullscreen', '');
        wrap.appendChild(iframe);
        btn.textContent = '🔇';
        btn.classList.add('playing');
        tip.textContent   = '🎶 MC Gorila tocando!';
        tip.style.display = 'block';
        setTimeout(() => { tip.style.display = 'none'; }, 3000);
        playing = true;
      } else {
        if (iframe) { wrap.removeChild(iframe); iframe = null; }
        btn.textContent = '🎵';
        btn.classList.remove('playing');
        playing = false;
      }
    });
  </script>
</body>
</html>
